{{- if .Values.client.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nats-grpc-benchmark.fullname" . }}-client
  labels:
    app: {{ include "nats-grpc-benchmark.name" . }}-client
    chart: {{ include "nats-grpc-benchmark.chart" . }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.client.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "nats-grpc-benchmark.name" . }}-client
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "nats-grpc-benchmark.name" . }}-client
        release: {{ .Release.Name }}
      annotations:
        {{- if .Values.datadog.enabled }}
        ad.datadoghq.com/client.check_names: '["openmetrics"]'
        ad.datadoghq.com/client.init_configs: '[{}]'
        ad.datadoghq.com/client.instances: |
          [
            {
              "prometheus_url": "http://%%host%%:{{ .Values.client.metricsPort }}/metrics",
              "namespace": "{{ .Values.datadog.namespace }}",
              "metrics": ["{{ .Values.datadog.metricsPattern }}"]
            }
          ]
        {{- end }}
    spec:
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: client
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/app/benchmark-client"]
        args:
          - "--nats-url={{ .Values.nats.url }}"
          - "--client-count={{ .Values.client.clientCount }}"
          - "--payload-size={{ .Values.client.payloadSize }}"
          - "--metrics-port={{ .Values.client.metricsPort }}"
          - "--request-timeout={{ .Values.client.requestTimeout }}"
        ports:
        - name: metrics
          containerPort: {{ .Values.client.metricsPort }}
          protocol: TCP
        resources:
          {{- toYaml .Values.client.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
{{- end }}
