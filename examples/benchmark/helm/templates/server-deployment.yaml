{{- if .Values.server.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nats-grpc-benchmark.fullname" . }}-server
  labels:
    app: {{ include "nats-grpc-benchmark.name" . }}-server
    chart: {{ include "nats-grpc-benchmark.chart" . }}
    release: {{ .Release.Name }}
spec:
  serviceName: {{ include "nats-grpc-benchmark.fullname" . }}-server
  podManagementPolicy: Parallel
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "nats-grpc-benchmark.name" . }}-server
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "nats-grpc-benchmark.name" . }}-server
        release: {{ .Release.Name }}
      annotations:
        {{- if .Values.datadog.enabled }}
        ad.datadoghq.com/server.check_names: '["openmetrics"]'
        ad.datadoghq.com/server.init_configs: '[{}]'
        ad.datadoghq.com/server.instances: |
          [
            {
              "openmetrics_endpoint": "http://%%host%%:{{ .Values.server.metricsPort }}/metrics",
              "namespace": "{{ .Values.datadog.namespace }}",
              "metrics": {{ toJson .Values.datadog.metricsPatterns }},
              "histogram_buckets_as_distributions": true,
              "non_cumulative_histogram_buckets": true,
              "collect_counters_with_distributions": true
            }
          ]
        {{- end }}
    spec:
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/app/benchmark-server"]
        args:
          - "--nats-url={{ .Values.nats.url }}"
          - "--server-count={{ .Values.server.serverCount }}"
          - "--payload-size={{ .Values.server.payloadSize }}"
          - "--metrics-port={{ .Values.server.metricsPort }}"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - name: metrics
          containerPort: {{ .Values.server.metricsPort }}
          protocol: TCP
        resources:
          {{- toYaml .Values.server.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
{{- end }}
