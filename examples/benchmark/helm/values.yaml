# Default values for nats-grpc-benchmark

# Image configuration
image:
  repository: us-central1-docker.pkg.dev/encoded-stage-394013/containers/nats-grpc-benchmark
  pullPolicy: Always
  tag: "latest"

# NATS server connection
nats:
  url: "nats://nats.gke.internal:4222"

# Server configuration
server:
  enabled: true
  replicaCount: 10
  serverCount: 100  # Number of servers per pod
  payloadSize: 4096
  metricsPort: 9090

  resources:
    limits:
      cpu: "8"
      memory: 32Gi
    requests:
      cpu: "8"
      memory: 32Gi

  service:
    type: ClusterIP
    metricsPort: 9090

# Client configuration
client:
  enabled: true
  replicaCount: 10
  clientCount: 100  # Number of clients per pod
  payloadSize: 4096
  metricsPort: 9091
  requestTimeout: 30  # gRPC request timeout in seconds

  resources:
    limits:
      cpu: "8"
      memory: 32Gi
    requests:
      cpu: "8"
      memory: 32Gi

  service:
    type: ClusterIP
    metricsPort: 9091

# ServiceMonitor for Prometheus Operator (optional)
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

# Datadog configuration for metrics export
datadog:
  enabled: true
  namespace: "nats_grpc_benchmark"
  metricsPattern: "grpc_*"  # Collect all gRPC metrics

# Tolerations - allow scheduling on nodes with GPU taints
tolerations:
  - key: nvidia.com/gpu
    operator: Equal
    value: present
    effect: NoSchedule
