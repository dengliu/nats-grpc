# Default values for nats-grpc-benchmark

# Image configuration
image:
  repository: us-central1-docker.pkg.dev/encoded-stage-394013/containers/nats-grpc-benchmark
  pullPolicy: Always
  tag: "latest"

# NATS server connection
nats:
  # url: "nats://nats.gke.internal:4222"
  url: "nats://nats:4222"

# Common defaults shared by both server and client deployments. Any field
# here can be overridden per-side by setting the same key under server: or
# client: (e.g. server.replicaCount, client.natsConnections, ...).
#
# Use this block when you want symmetric scaling of the benchmark; only set
# server.* / client.* values where the two sides truly differ.
common:
  # Number of pods per side (replicas of the server/client StatefulSet)
  replicaCount: 50
  # Number of server/client goroutines spawned inside each pod
  # (passed as --server-count or --client-count to the binary)
  count: 1000
  # Number of NATS connections per pod, shared across all goroutines via
  # stripe assignment. NATS is goroutine-safe and multiplexes any number
  # of subscriptions / in-flight requests per conn; keeping this small
  # avoids overwhelming the NATS cluster's connection table. Same value is
  # used for both server pods (subscribers) and client pods (requesters).
  natsConnections: 4
  # Payload size in bytes for both requests and responses
  payloadSize: 4096
  resources:
    limits:
      cpu: "4"
      memory: 16Gi
    requests:
      cpu: "4"
      memory: 16Gi

# Server configuration (overrides for common, plus server-specific fields)
server:
  enabled: true
  metricsPort: 9090
  service:
    type: ClusterIP
    metricsPort: 9090

# Client configuration (overrides for common, plus client-specific fields)
client:
  enabled: true
  metricsPort: 9091
  requestTimeout: 30  # gRPC request timeout in seconds
  service:
    type: ClusterIP
    metricsPort: 9091


# ServiceMonitor for Prometheus Operator (optional)
serviceMonitor:
  enabled: false
  interval: 10s
  scrapeTimeout: 10s

# Datadog configuration for metrics export
datadog:
  enabled: true
  namespace: "nats_grpc_benchmark"
  # Patterns for the Datadog openmetrics check to collect. rpc_* covers the
  # otelgrpc-emitted histograms (rpc_client_call_duration_seconds, etc.);
  # grpc_* keeps the legacy custom gauge grpc_client_active_total.
  metricsPatterns:
    - "rpc_*"
    - "grpc_*"

# Tolerations - allow scheduling on nodes with GPU taints
tolerations:
  - key: nvidia.com/gpu
    operator: Equal
    value: present
    effect: NoSchedule
