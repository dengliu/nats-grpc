# Default values for nats-grpc-benchmark

# Image configuration
image:
  repository: us-central1-docker.pkg.dev/encoded-stage-394013/containers/nats-grpc-benchmark
  pullPolicy: Always
  tag: "latest"

# NATS server connection
nats:
  url: "nats://nats.gke.internal:4222"

# Server configuration
server:
  enabled: true
  replicaCount: 100
  serverCount: 1000  # Number of servers per pod
  # Number of NATS connections per pod, shared across all server goroutines
  # via stripe assignment. NATS is goroutine-safe and multiplexes any number
  # of subscriptions per conn; keeping this small avoids overwhelming the
  # NATS cluster's connection table.
  natsConnections: 4
  payloadSize: 4096
  metricsPort: 9090

  resources:
    limits:
      cpu: "4"
      memory: 16Gi
    requests:
      cpu: "4"
      memory: 16Gi

  service:
    type: ClusterIP
    metricsPort: 9090

# Client configuration
client:
  enabled: true
  replicaCount: 100
  clientCount: 1000  # Number of clients per pod
  # Number of NATS connections per pod, shared across all client goroutines
  # via stripe assignment. A single nats.Conn multiplexes thousands of
  # in-flight nc.RequestWithContext calls via its shared inbox subscription.
  natsConnections: 4
  payloadSize: 4096
  metricsPort: 9091
  requestTimeout: 30  # gRPC request timeout in seconds

  resources:
    limits:
      cpu: "4"
      memory: 16Gi
    requests:
      cpu: "4"
      memory: 16Gi

  service:
    type: ClusterIP
    metricsPort: 9091

# ServiceMonitor for Prometheus Operator (optional)
serviceMonitor:
  enabled: false
  interval: 10s
  scrapeTimeout: 10s

# Datadog configuration for metrics export
datadog:
  enabled: true
  namespace: "nats_grpc_benchmark"
  # Patterns for the Datadog openmetrics check to collect. rpc_* covers the
  # otelgrpc-emitted histograms (rpc_client_call_duration_seconds, etc.);
  # grpc_* keeps the legacy custom gauge grpc_client_active_total.
  metricsPatterns:
    - "rpc_*"
    - "grpc_*"

# Tolerations - allow scheduling on nodes with GPU taints
tolerations:
  - key: nvidia.com/gpu
    operator: Equal
    value: present
    effect: NoSchedule
