syntax = "proto3";

package nrpc;

option go_package = "github.com/cloudwebrtc/nats-grpc/pkg/protos/nrpc";

import "google/rpc/status.proto";

message Request {
	oneof type {
		Call call = 2;
		Data data = 3;
		End end = 4;
		Ping ping = 5;
		UnaryRequest unary = 6;
	}
}

message Response {
	oneof type {
		Begin begin = 2;
		Data data = 3;
		End end = 4;
		Pong pong = 5;
		UnaryResponse unary = 6;
	}
}

// UnaryRequest bundles Call + Data into a single message so unary RPCs can be
// served via NATS request/reply (queue-group load-balanced).
message UnaryRequest {
	string method = 1;
	Metadata metadata = 2;
	bytes data = 3;
}

// UnaryResponse carries the full reply for a unary RPC in one message.
message UnaryResponse {
	Metadata header = 1;
	Metadata trailer = 2;
	google.rpc.Status status = 3;
	bytes data = 4;
}

message Strings {
	repeated string values = 1;
}

message Metadata {
	map<string, Strings> md = 1;
}

message Call {
	string method = 1;
	Metadata metadata = 2;
	string nid = 3;
}

message Begin {
	Metadata header = 1;
	string nid = 2;
}

message Data {
	bytes data = 1;
}

message End {
	google.rpc.Status status = 1;
	Metadata trailer = 2;
}

message Ping {
	int64 timestamp = 1;
}

message Pong {
	int64 timestamp = 1;
}
